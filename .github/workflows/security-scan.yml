name: WordPress Security & Performance Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security-scan:
    name: PHPCS Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: cs2pr, composer

      - name: Install PHPCS and WordPress standards
        run: |
          composer global config allow-plugins.dealerdirect/phpcodesniffer-composer-installer true
          composer global require "squizlabs/php_codesniffer:^3.13"
          composer global require "wp-coding-standards/wpcs:^3.1"
          composer global require "phpcompatibility/phpcompatibility-wp:^2.1"
          composer global require "dealerdirect/phpcodesniffer-composer-installer:^1.0"

      - name: Verify coding standards are registered
        run: |
          phpcs -i

      - name: Run WordPress security scan on custom code
        run: |
          phpcs \
            --standard=tests/phpcs/phpcs.xml \
            --report=checkstyle \
            --report-file=phpcs-report.xml \
            || true

      - name: Display human-readable results
        run: |
          phpcs \
            --standard=tests/phpcs/phpcs.xml \
            --report=summary \
            || true

      - name: Annotate PR with inline comments
        if: always()
        run: |
          if [ -f phpcs-report.xml ]; then
            cs2pr phpcs-report.xml || true
          fi

      - name: Report critical security issues
        run: |
          phpcs \
            --standard=tests/phpcs/phpcs.xml \
            --error-severity=5 \
            --warning-severity=0 \
            --report=summary \
            || echo "::warning::Critical security issues found — review the scan results above"

  version-check:
    name: Plugin & Theme Version Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run version & vulnerability check
        env:
          WORDFENCE_API_TOKEN: ${{ secrets.WORDFENCE_API_TOKEN }}
          MANIFEST_PATH: tests/config/plugins.yml
        run: |
          set +e
          python tests/scripts/check-versions.py
          exit_code=$?
          set -e

          if [ $exit_code -eq 1 ]; then
            echo "::error::Known vulnerabilities detected — see log above"
            exit 1
          elif [ $exit_code -eq 2 ]; then
            echo "::warning::Some plugins/themes are outdated — see log above"
            exit 0
          fi
          exit 0

  lighthouse:
    name: Lighthouse Performance Audit
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run Lighthouse audit
        env:
          PAGESPEED_API_KEY: ${{ secrets.PAGESPEED_API_KEY }}
          LIGHTHOUSE_CONFIG: tests/config/lighthouse-pages.yml
          LIGHTHOUSE_OUTPUT: lighthouse-results.json
        run: |
          set +e
          python tests/scripts/lighthouse-audit.py
          exit_code=$?
          set -e

          if [ $exit_code -eq 1 ]; then
            echo "::error::Lighthouse audit failed — see log above"
            exit 1
          elif [ $exit_code -eq 2 ]; then
            echo "::warning::Some pages are below score thresholds — see log above"
            exit 0
          fi
          exit 0

      - name: Upload results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-results
          path: lighthouse-results.json
          retention-days: 90
